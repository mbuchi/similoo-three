name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx vitest run --passWithNoTests
      - name: Unused dependency check (informational, non-blocking)
        continue-on-error: true
        run: npx -y depcheck --ignores="@types/*,vitest,@vitest/*,@testing-library/*,jsdom,eslint*,prettier,typescript,autoprefixer,postcss,tailwindcss,@vitejs/*,@tailwindcss/*" || true
